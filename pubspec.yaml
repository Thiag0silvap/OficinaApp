name: oficina_app
description: "Sistema de gestão para oficinas automotivas - OficinaApp"
publish_to: 'none'

version: 1.0.3+10

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.1.0
  flutter_secure_storage: ^9.2.2
  image_picker: ^0.8.7+4
  flutter_image_compress: ^2.4.0
  signature: ^6.3.0
  path_provider: ^2.0.14
  sqflite: ^2.2.7+3
  sqflite_common_ffi: ^2.0.0
  sqlite3_flutter_libs: ^0.5.11
  intl: ^0.18.0
  path: ^1.8.3
  crypto: ^3.0.2
  uuid: ^3.0.7
  pdf: ^3.10.1
  printing: ^5.10.0
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png

msix_config:
  display_name: OficinaApp
  publisher_display_name: Thiago Pereira
  identity_name: com.thiagopereira.oficinaapp
  msix_version: 1.0.3.0
  logo_path: assets/images/logo.png
  trim_logo: false
  capabilities: internetClient
  install_certificate: true